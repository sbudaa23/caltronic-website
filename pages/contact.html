<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hire Technician</title>
</head>

<body style="font-family:Arial, sans-serif; margin:0;">

<h2 style="padding:20px;">Hire a Technician</h2>

<div style="padding:20px; max-width:500px;">

<form>

<label>Company Name</label><br>
<input type="text" style="width:100%; padding:10px;" required><br><br>

<label>Contact Person</label><br>
<input type="text" style="width:100%; padding:10px;" required><br><br>

<label>Service Required</label><br>
<textarea style="width:100%; padding:10px;" rows="4"></textarea><br><br>

<label>Location</label><br>
<input type="text" style="width:100%; padding:10px;"><br><br>

<label>Preferred Date</label><br>
<input type="date" style="padding:10px;"><br><br>

<button type="submit" style="padding:12px 20px;">
Send Request
</button>

</form>

</div>

</body>
</html>
